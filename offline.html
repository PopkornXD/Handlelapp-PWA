<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline — Handlelapp</title>
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#f7f7fb;color:#111}
  .box{max-width:420px;text-align:center;padding:24px;border-radius:8px;background:#fff;box-shadow:0 6px 24px rgba(0,0,0,0.08)}
  h1{margin:0 0 8px;font-size:20px}
  p{margin:0 0 12px;color:#444}
  button{background:#2563eb;color:#fff;border:none;padding:8px 12px;border-radius:6px;font-size:14px}
</style>
<div class="box">
  <h1>Ingen Internett-forbindelse</h1>
  <p>Du er frakoblet. Appen fungerer best med nett, men du kan prøve igjen når du er tilbake på nett.</p>
  <button onclick="location.reload()">Prøv å laste på nytt</button>
</div>
