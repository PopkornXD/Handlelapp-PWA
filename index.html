<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Handlelapp</title>
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app" aria-labelledby="title">
        <h1 id="title">Handlelapp</h1>

        <form id="addForm" aria-label="Legg til vare">
            <input id="itemInput" type="text" placeholder="Skriv inn vare og trykk Enter eller Legg til" autocomplete="off" />
            <button id="addBtn" type="submit">Legg til</button>
        </form>

        <ul id="list" aria-live="polite"></ul>

        <div class="controls">
            <div class="count" id="count">0 varer</div>
            <div>
                <button id="clearBtn" class="secondary" title="Fjern alle varer">Fjern alle</button>
            </div>
        </div>
    </main>
        <div id="updateToast" style="position:fixed;left:16px;right:16px;bottom:16px;display:none;align-items:center;justify-content:center;">
            <div style="background:#111;color:#fff;padding:10px 14px;border-radius:8px;display:flex;gap:8px;align-items:center;justify-content:center;">
                <span id="updateMsg">Ny versjon tilgjengelig</span>
                <button id="reloadBtn" style="background:#fff;color:#111;border:none;padding:6px 10px;border-radius:6px">Last inn</button>
            </div>
        </div>

    <script src="app.js" defer></script>
</body>
</html>
